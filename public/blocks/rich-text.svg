<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <rect width="400" height="250" fill="#f8f6f0"/>
  <!-- Heading -->
  <rect x="30" y="25" width="200" height="16" rx="2" fill="#1e3a5f"/>
  <!-- Paragraph lines -->
  <rect x="30" y="55" width="340" height="8" rx="2" fill="#999"/>
  <rect x="30" y="70" width="320" height="8" rx="2" fill="#999"/>
  <rect x="30" y="85" width="300" height="8" rx="2" fill="#999"/>
  <rect x="30" y="100" width="340" height="8" rx="2" fill="#999"/>
  <rect x="30" y="115" width="200" height="8" rx="2" fill="#999"/>
  <!-- Subheading -->
  <rect x="30" y="145" width="150" height="12" rx="2" fill="#1e3a5f" opacity="0.7"/>
  <!-- More paragraph -->
  <rect x="30" y="170" width="340" height="8" rx="2" fill="#999"/>
  <rect x="30" y="185" width="310" height="8" rx="2" fill="#999"/>
  <rect x="30" y="200" width="330" height="8" rx="2" fill="#999"/>
  <rect x="30" y="215" width="260" height="8" rx="2" fill="#999"/>
</svg>
