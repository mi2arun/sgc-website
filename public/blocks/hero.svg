<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <rect width="400" height="250" fill="#1e3a5f"/>
  <!-- Image background indicator -->
  <rect x="0" y="0" width="400" height="250" fill="#1e3a5f" opacity="0.8"/>
  <line x1="0" y1="0" x2="400" y2="250" stroke="#2a4a6f" stroke-width="1"/>
  <line x1="400" y1="0" x2="0" y2="250" stroke="#2a4a6f" stroke-width="1"/>
  <!-- Centered college name -->
  <rect x="100" y="80" width="200" height="16" rx="2" fill="#c8a951" opacity="0.6"/>
  <rect x="70" y="105" width="260" height="24" rx="2" fill="#fff" opacity="0.9"/>
  <rect x="120" y="138" width="160" height="12" rx="2" fill="#ccc" opacity="0.5"/>
  <!-- CTA button -->
  <rect x="150" y="170" width="100" height="36" rx="18" fill="#c8a951"/>
  <rect x="170" y="183" width="60" height="10" rx="2" fill="#1e3a5f"/>
</svg>
