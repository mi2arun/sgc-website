<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <rect width="400" height="250" fill="#f8f6f0"/>
  <!-- Heading -->
  <rect x="130" y="15" width="140" height="14" rx="2" fill="#1e3a5f"/>
  <!-- Progress bars -->
  <g transform="translate(30,50)">
    <rect x="0" y="0" width="80" height="8" rx="2" fill="#1e3a5f" opacity="0.7"/>
    <rect x="0" y="16" width="340" height="20" rx="10" fill="#e5e5e5"/>
    <rect x="0" y="16" width="310" height="20" rx="10" fill="#1e3a5f"/>
    <text x="320" y="30" font-family="sans-serif" font-size="10" fill="#fff" font-weight="bold">92%</text>
  </g>
  <g transform="translate(30,100)">
    <rect x="0" y="0" width="60" height="8" rx="2" fill="#1e3a5f" opacity="0.7"/>
    <rect x="0" y="16" width="340" height="20" rx="10" fill="#e5e5e5"/>
    <rect x="0" y="16" width="290" height="20" rx="10" fill="#c8a951"/>
    <text x="300" y="30" font-family="sans-serif" font-size="10" fill="#1e3a5f" font-weight="bold">85%</text>
  </g>
  <g transform="translate(30,150)">
    <rect x="0" y="0" width="70" height="8" rx="2" fill="#1e3a5f" opacity="0.7"/>
    <rect x="0" y="16" width="340" height="20" rx="10" fill="#e5e5e5"/>
    <rect x="0" y="16" width="320" height="20" rx="10" fill="#1e3a5f"/>
    <text x="328" y="30" font-family="sans-serif" font-size="10" fill="#fff" font-weight="bold">95%</text>
  </g>
  <g transform="translate(30,200)">
    <rect x="0" y="0" width="90" height="8" rx="2" fill="#1e3a5f" opacity="0.7"/>
    <rect x="0" y="16" width="340" height="20" rx="10" fill="#e5e5e5"/>
    <rect x="0" y="16" width="265" height="20" rx="10" fill="#c8a951"/>
    <text x="275" y="30" font-family="sans-serif" font-size="10" fill="#1e3a5f" font-weight="bold">78%</text>
  </g>
</svg>
